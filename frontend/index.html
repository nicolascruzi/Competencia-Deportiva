<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1B2A" />
    <title>Nanão Cup 🏆</title>
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        overflow-x: hidden;
        background: #0D1B2A;
      }
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        background: #0D1B2A;
        color: #E8F0FE;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        overscroll-behavior-y: none;
        min-height: 100dvh;
      }
      #root {
        min-height: 100dvh;
        width: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
      }
      /* Oculta scrollbars en webkit */
      ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
      /* Evita zoom en inputs en iOS */
      input, select, textarea { font-size: 16px; }
      /* Inputs nativos */
      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); }
      /* Animations */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
